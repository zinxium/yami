<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest border border-outline-variant">

<main class="flex-grow px-margin-mobile pt-stack-md pb-stack-lg max-w-lg mx-auto w-full">
<!-- Section Header -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Modifier l'Emprunteur</h1>
<p class="text-on-surface-variant font-body-sm">Mettez à jour les informations essentielles de votre contact d'emprunt.</p>
</div>
<!-- Form Section -->
<form class="space-y-stack-md" id="editBorrowerForm">
<!-- Profile Picture Placeholder -->
<div class="flex flex-col items-center justify-center mb-8">
<div class="relative group">
<div class="w-24 h-24 rounded-full bg-white flex items-center justify-center border-2 border-dashed border-outline-variant soft-shadow overflow-hidden">
<img alt="Borrower Photo" class="w-full h-full object-cover" data-alt="A professional studio portrait of a friendly West African man with short hair and a clean-shaven face, wearing a crisp cream-colored linen shirt. The lighting is warm and cinematic, set against a soft burgundy and cream textured background that reflects a high-end banking aesthetic. The mood is trustworthy and reliable." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGKqx6zOcYhfRinhBVs3fhsGPbnMGcSTGeSDRmjoeJ1abnUGIpkJnfc23OBcrm1eQ-8eRTIeaU22N7OiS3pagYigtyAYvAuMe22cPa6r388gTmyA7CfIsTCPA0_sLkeBHxHltzr1_2VmpBAwsm9dueqbwl0T8zwepSfttPWC3dQP6Ax-Z8xA91HuIz1kw4n2nazUF4qBfXzqQ0bRKQWkXHPr4thpdXqJTXB2fJAWyLexqsrN6aEh5rFHDFpYzA_RHABtfIP_UGGas"/>
</div>
<button class="absolute bottom-0 right-0 bg-secondary-container p-2 rounded-full text-on-secondary-container shadow-md hover:bg-secondary hover:text-on-secondary transition-all active:scale-90" type="button">
<span class="material-symbols-outlined text-sm" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<span class="font-label-sm text-on-surface-variant mt-2">Changer la photo</span>
</div>
<!-- Inputs -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-primary">Nom Complet</label>
<div class="relative">
<input class="w-full bg-white border-outline-variant border-2 rounded-xl px-4 py-3 focus:ring-primary focus:border-primary transition-all font-body-md" placeholder="Entrez le nom complet" type="text" value="Jean Dupont"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="person">person</span>
</div>
</div>
<div class="space-y-stack-sm">
<label class="block font-label-md text-primary">Numéro de Téléphone</label>
<div class="relative">
<input class="w-full bg-white border-outline-variant border-2 rounded-xl px-4 py-3 focus:ring-primary focus:border-primary transition-all font-body-md" placeholder="+237 ..." type="tel" value="+237 678 901 234"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="call">call</span>

</div>

</div>

<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-label-md py-4 rounded-full soft-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">

<span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>
                Supprimer cet emprunteur
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (Hidden as per Destination Rule for focused task) -->
<!-- Suppressed to prioritize the "Edit" transaction flow -->
<script>
        // Micro-interactions
        document.getElementById('editBorrowerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Mise à jour...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Mis à jour !`;
                btn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-secondary', 'bg-primary');
                }, 2000);
            }, 1500);
        });

        // Input Focus Effects
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
