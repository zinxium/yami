                        "on-secondary": "#ffffff",
                        "surface-bright": "#fcf9f4",
                        "outline": "#8c7071",
                        "tertiary": "#540518",
                        "surface-container-high": "#ebe8e3",
                        "background": "#fcf9f4",
                        "tertiary-container": "#731e2c",
                        "secondary-fixed": "#ffe179",
                        "tertiary-fixed-dim": "#ffb2b8",
                        "error": "#ba1a1a",

                        "on-surface": "#1c1c19",

<style>
        body {
            background-color: #fcf9f4; /* Theme surface color */
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .btn-active-state:active {
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .input-focus-ring:focus-within {
            border-color: #570013; /* Primary */
            box-shadow: 0 0 0 1px #570013;
        }

        /* Subtle Background Pattern */
        .bg-pattern {
            background-image: radial-gradient(#e5e2dd 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="font-body-md text-on-surface selection:bg-secondary-container">
<!-- Back Navigation Shell -->
<nav class="fixed top-0 left-0 w-full z-50 flex items-center px-margin-mobile py-stack-md">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface shadow-[0_4px_20px_rgba(77,0,19,0.05)] text-primary btn-active-state" onclick="history.back()">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</nav>
<main class="min-h-screen flex flex-col items-center justify-center px-margin-mobile relative bg-pattern">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 shadow-[0_12px_40px_rgba(77,0,19,0.03)] border border-surface-variant/30">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-20 h-20 mb-stack-sm rounded-xl overflow-hidden bg-white shadow-sm flex items-center justify-center">
<img alt="Ya Mi Elephant Logo" class="w-16 h-16 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uh53Bawq1lNI3ruE3jzlIgqRB957Cn1p5eAe3edneNrsX6zFwQ76bfZauQEGNekSoS2O3zdsNlHH-pcFd4YiAFbU5iaKUCFPagNINBQimYHQOlNDxTViV5liDUjdEIA6QLo1N_UWFtz6ivRjSyxRUUXfZmdq0zub-gYXWxU5Vovt57-DXxT3TzJjSCEU38TsG6V4WRwRSN1p3weHDYIBUFKTJgmm86j2qf0oFyWnAeKprSDgcq_EGEMpQ"/>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Ya Mi</h1>
</div>
<!-- Content Section -->
<div class="text-center mb-stack-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Mot de passe oublié</h2>
<p class="font-body-md text-on-surface-variant px-2">
                    Entrez votre email pour recevoir un lien de réinitialisation
                </p>
</div>
<!-- Form -->
<form class="space-y-stack-md" id="forgotPasswordForm" onsubmit="return handleReset(event)">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">
                        Adresse Email
                    </label>
<div class="relative group input-focus-ring rounded-lg border border-outline-variant bg-surface transition-all duration-200">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-transparent border-none focus:ring-0 font-body-md text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="nom@exemple.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 btn-active-state flex items-center justify-center gap-2" type="submit">
                    Envoyer le lien
                    <span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
</button>
</form>
<!-- Success Feedback (Hidden by default) -->
<div class="hidden mt-stack-md p-4 bg-secondary-container/30 border border-secondary/20 rounded-lg text-center animate-in fade-in slide-in-from-top-4 duration-500" id="successMessage">
<span class="material-symbols-outlined text-secondary text-4xl mb-2" data-icon="check_circle">check_circle</span>
<p class="font-body-sm text-on-secondary-container">Lien envoyé ! Veuillez vérifier votre boîte de réception.</p>
</div>
<!-- Footer Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-on-surface-variant">
                    Vous vous en souvenez ? 
                    <a class="text-primary font-label-md hover:underline decoration-2 underline-offset-4" href="#">Connectez-vous</a>
</p>
</div>
</div>
<!-- Support Info -->
<div class="mt-stack-lg flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-[16px]" data-icon="support_agent">support_agent</span>
<span class="font-label-sm text-label-sm">Besoin d'aide ? Contactez le support</span>
</div>
</main>
<script>
        function handleReset(event) {
            event.preventDefault();
            const form = document.getElementById('forgotPasswordForm');
            const success = document.getElementById('successMessage');
            const button = form.querySelector('button');
            const buttonText = button.innerHTML;

            // Simple micro-interaction
            button.disabled = true;
            button.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';

            setTimeout(() => {
                form.classList.add('opacity-40', 'pointer-events-none');
                success.classList.remove('hidden');
                button.innerHTML = buttonText;
                button.disabled = false;
            }, 1500);

            return false;
        }

        // Mouse move parallax effect for the background (subtle)
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            document.body.style.backgroundPosition = `${moveX}px ${moveY}px`;
        });
    </script>
</body></html>
