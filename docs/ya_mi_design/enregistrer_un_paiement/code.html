<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf9f4;
            color: #1c1c19;
            -webkit-font-smoothing: antialiased;
        }
        .custom-shadow {
            box-shadow: 0 12px 32px -4px rgba(77, 0, 19, 0.05), 0 4px 12px -2px rgba(77, 0, 19, 0.03);
        }
        .inner-pattern {
            background-image: radial-gradient(#570013 0.5px, transparent 0.5px);
            background-size: 12px 12px;
            opacity: 0.05;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-margin-mobile py-base docked full-width">
<div class="flex items-center gap-4">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="pest_control_rodent" style="font-variation-settings: 'FILL' 1;">pest_control_rodent</span> <!-- Placeholder for Elephant-like icon/Logo -->
<h1 class="font-headline-md text-headline-md text-primary font-bold">Ya Mi</h1>
</div>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed">
<img alt="Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a smiling West African man in a clean white linen shirt against a soft, sun-drenched architectural background. The lighting is warm and natural, following a premium lifestyle photography aesthetic with soft shadows and a high-key color palette consistent with dignified accessibility and trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUgnbde87MlQpyiv9G64VpHoElP2vEym4j-CksdnXEOtD-21-WDLes90bD9AGtpy724G91PEokyYlVDO4igasUdims92roQDL6WXSTond6Xu9KQhDgWkQKflFNWCnfEehGCk49483YLScY9Y5GDqb3FHl96g-FGBtYjBAJveSvUt65vMHMk9lOQKnSVpumdoxl2bd0hvihHVDnvN9vlKACfrnd-UwB6WATFrZJMEwWjTin5hwYuVpMtklxTaeQ_q17Oe-egSqRClY"/>
</div>
</header>
<main class="flex-1 px-margin-mobile py-stack-md max-w-2xl mx-auto w-full">
<!-- Page Title -->
<div class="mb-stack-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Enregistrer un Paiement</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Effectuez votre remboursement en toute sécurité.</p>
</div>
<!-- Balance Card -->
<section class="relative bg-white rounded-xl p-6 custom-shadow mb-stack-md overflow-hidden group">
<div class="absolute inset-0 inner-pattern pointer-events-none"></div>
<div class="relative z-10 flex flex-col gap-6">
<div class="flex justify-between items-start">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Solde Total du Prêt</p>
<h3 class="font-display-lg text-display-lg text-primary">850.000 FCFA</h3>
</div>
<div class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="font-label-sm text-label-sm">Actif</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4 pt-4 border-t border-outline-variant/30">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Prochaine Échéance</p>
<p class="font-headline-md text-headline-md text-on-surface">45.000 FCFA</p>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Date Limite</p>
<p class="font-headline-md text-headline-md text-on-surface">12 Oct 2023</p>
</div>
</div>
</div>
</section>
<!-- Payment Form -->
<form class="flex flex-col gap-stack-md pb-stack-lg">
<!-- Amount Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="amount">Montant du Paiement</label>
<div class="relative">
<input class="w-full bg-surface border-ui_gray border focus:border-primary focus:ring-0 rounded-lg p-4 font-body-lg text-body-lg outline-none transition-all" id="amount" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 font-label-md text-primary">FCFA</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Date Picker -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="date">Date du Paiement</label>
<div class="relative">
<input class="w-full bg-surface border-ui_gray border focus:border-primary focus:ring-0 rounded-lg p-4 font-body-md text-body-md outline-none" id="date" type="date"/>
</div>
</div>
<!-- Method Selector -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="method">Mode de Paiement</label>
<select class="w-full bg-surface border-ui_gray border focus:border-primary focus:ring-0 rounded-lg p-4 font-body-md text-body-md appearance-none outline-none" id="method">
<option value="transfer">Virement Bancaire</option>
<option value="cash">Espèces</option>
<option value="mobile">Mobile Money</option>
<option value="card">Carte Bancaire</option>
</select>
</div>
</div>
<!-- Note Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="notes">Note (Optionnel)</label>
<textarea class="w-full bg-surface border-ui_gray border focus:border-primary focus:ring-0 rounded-lg p-4 font-body-md text-body-md outline-none transition-all resize-none" id="notes" placeholder="Référence du virement ou commentaire..." rows="3"></textarea>
</div>
<!-- Visual Asset / Confirmation Background -->
<div class="w-full h-32 rounded-xl overflow-hidden relative mb-2">
<img alt="Finance Illustration" class="w-full h-full object-cover" data-alt="A warm, premium close-up of hands exchanging currency and a modern smartphone in a bright, minimalist office setting. The composition uses shallow depth of field, highlighting rich natural textures and soft burgundy accents. The overall mood is professional, secure, and human-centric, embodying the brand's commitment to dignified financial accessibility." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDlDH53b4HNmH_cREaQzYafGG0IwR3ckrYGWg6VmEQqlm2hBVp0cb_CGkVGDTeeto8oxmrVqW3QLbDVYCjq2YLeHcVcNOGIamprwbCxiapCNre3xmGFbVSgA7JRJf5lKMSkQ-gz33KgvGrGvHUsfN-9KiKQHGkO0XdNjn_HSxf8CQDJ_oVT5tkCd4KWW8FlyTGHsVg3HXjJtK8bPrAAt6XcBR17fQA30plpi0NZ_Fl1frtV4CdnS8tW2KXZ-kFQV4NbOjNoMwJKHg"/>
<div class="absolute inset-0 bg-primary/20 mix-blend-multiply"></div>
<div class="absolute inset-0 flex items-center justify-center">
<p class="font-label-md text-white text-center px-6">Paiement sécurisé par cryptage SSL 256-bit</p>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-white font-label-md text-label-md py-4 rounded-full custom-shadow hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2" onclick="handlePayment()" type="button">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
                Confirmer le Paiement
            </button>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full bg-surface-container rounded-t-xl z-50 flex justify-around items-center px-gutter py-base pb-safe shadow-[0_-4px_20px_rgba(77,0,19,0.05)] border-t-0">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm-mobile">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-sm text-label-sm-mobile">Loans</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-sm text-label-sm-mobile">Pay</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm-mobile">Profile</span>
</button>
</nav>
<script>
        function handlePayment() {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            
            // Simple micro-interaction
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Traitement...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Succès';
                btn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-secondary', 'bg-primary');
                    btn.disabled = false;
                    alert('Votre demande de paiement a été enregistrée avec succès.');
                }, 2000);
            }, 1500);
        }

        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body></html>
